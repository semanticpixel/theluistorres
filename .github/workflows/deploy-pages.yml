name: Deploy site to GitHub Pages

# Triggers when master changes and (manually) from the Actions UI.
# The pull_request: closed trigger covers the sync-contributions auto-merge
# case: GitHub's loop-prevention rule swallows the `push` event when a commit
# is authored by GITHUB_TOKEN (which is who performs the auto-merge squash),
# so without this the sync would land on master but never deploy.
on:
  push:
    branches: [master]
  pull_request:
    types: [closed]
    branches: [master]
  workflow_dispatch:

# Pages deploys need both `contents: read` (to clone) and `pages: write` +
# `id-token: write` (so the deploy step can authenticate against the Pages
# environment).
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel any in-flight deploy when a newer commit lands — no point publishing
# a stale build behind the head one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Astro
    runs-on: ubuntu-latest
    # On pull_request events, only deploy when the PR actually merged. Skips
    # closed-without-merge. The push trigger handles human merges that go via
    # a non-GITHUB_TOKEN actor — the concurrency group dedups overlap.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.merged == true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        # Reads packageManager + pnpm-workspace.yaml from the repo — no version
        # pinned here so the deploy follows what `package.json` declares.

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
