name: ci

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck · build · bundle budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Read the version from package.json's `packageManager` field. Specifying
        # `version:` here in addition to that field makes pnpm/action-setup@v4
        # bail with ERR_PNPM_BAD_PM_VERSION.

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build
        env:
          PERSONAL_GH_TOKEN: ${{ secrets.PERSONAL_GH_TOKEN }}
          WORK_GH_TOKEN: ${{ secrets.WORK_GH_TOKEN }}
          WORK_GH_API_URL: ${{ secrets.WORK_GH_API_URL }}

      - name: Home page bundle-size budget (CSS <12KB gz · JS <8KB gz)
        run: node scripts/bundle-size.mjs

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1
          if-no-files-found: error

  lighthouse:
    name: lighthouse (perf · a11y · seo ≥ 98)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Lighthouse CI
        run: npx --yes @lhci/cli@0.14 autorun --config=./lighthouserc.json
